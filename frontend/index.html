<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClientBase — Customer Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">
        <header>
            <div class="logo">
                <div class="logo-dot"></div>
                ClientBase
            </div>
            <button class="btn btn-primary" onclick="openCreateModal()">+ New Client</button>
        </header>

        <main>
            <!-- DASHBOARD VIEW -->
            <div id="view-dashboard" class="view active">
                <div class="dashboard-header">
                    <div>
                        <div class="page-title">Clients</div>
                        <div class="page-sub">Manage all your client relationships</div>
                    </div>
                </div>

                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">Total Clients</div>
                        <div class="stat-value" id="stat-total">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Renewing Soon</div>
                        <div class="stat-value accent-amber" id="stat-soon">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Overdue Renewals</div>
                        <div class="stat-value accent-red" id="stat-overdue">—</div>
                    </div>
                </div>

                <div class="search-bar">
                    <input class="search-input" type="text" placeholder="Search clients by name, company, or email..."
                        id="search-input" oninput="filterTable()">
                </div>

                <div id="loading-state" class="empty-state">
                    <div class="empty-icon">◌</div>
                    <div class="empty-title">Loading clients...</div>
                </div>

                <table class="client-table" id="client-table" style="display:none">
                    <thead>
                        <tr>
                            <th>Client</th>
                            <th>Contact</th>
                            <th>Renewal Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="client-tbody"></tbody>
                </table>

                <div class="empty-state" id="empty-state" style="display:none">
                    <div class="empty-icon">◎</div>
                    <div class="empty-title">No clients yet</div>
                    <div>Click "New Client" to add your first one.</div>
                </div>
            </div>

            <!-- PROFILE VIEW -->
            <div id="view-profile" class="view">
                <button class="back-btn" onclick="showDashboard()">← Back to clients</button>
                <div id="profile-content"></div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal">
            <div class="modal-title" id="modal-title">Add New Client</div>
            <div class="form-grid">
                <div class="field">
                    <label>First Name *</label>
                    <input type="text" id="f-first" placeholder="Jane">
                </div>
                <div class="field">
                    <label>Last Name *</label>
                    <input type="text" id="f-last" placeholder="Smith">
                </div>
                <div class="field">
                    <label>Company</label>
                    <input type="text" id="f-company" placeholder="Acme Corp">
                </div>
                <div class="field">
                    <label>Email *</label>
                    <input type="email" id="f-email" placeholder="jane@acme.com">
                </div>
                <div class="field">
                    <label>Phone</label>
                    <input type="tel" id="f-phone" placeholder="(555) 000-0000">
                </div>
                <div class="field">
                    <label>Renewal Date</label>
                    <input type="date" id="f-renewal" name="f-renewal" title="Renewal Date">
                </div>
                <div class="field form-full">
                    <label>Contract Details</label>
                    <textarea id="f-contract" placeholder="Service tier, monthly value, scope of work..."></textarea>
                </div>
                <div class="field form-full">
                    <label>Notes</label>
                    <textarea id="f-notes" placeholder="Any additional notes about this client..."></textarea>
                </div>
                <div class="field form-full">
                    <label>Additional Data</label>
                    <textarea id="f-extra"
                        placeholder="Custom fields, tags, or other relevant information..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="save-btn" onclick="saveClient()">Save Client</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script src="js/app.js"></script>
</body>

</html>
